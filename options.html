<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>The Missing Link - Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      min-width: 350px;
      background: #f6f8fa;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 16px 0;
      color: #24292f;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 500;
      color: #24292f;
    }
    .hint {
      font-size: 12px;
      color: #57606a;
      margin-bottom: 8px;
    }
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.1);
    }
    .buttons {
      display: flex;
      gap: 8px;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      border: none;
    }
    button.primary {
      background-color: #2da44e;
      color: white;
    }
    button.primary:hover {
      background-color: #2c974b;
    }
    button.danger {
      background-color: #ffffff;
      color: #cf222e;
      border: 1px solid #d0d7de;
    }
    button.danger:hover {
      background-color: #ffebe9;
      border-color: #cf222e;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }
    .status.success {
      display: block;
      background-color: #dafbe1;
      color: #1a7f37;
    }
    .status.error {
      display: block;
      background-color: #ffebe9;
      color: #cf222e;
    }
    hr {
      border: none;
      border-top: 1px solid #d0d7de;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <h1>The Missing Link - Settings</h1>

  <div class="form-group">
    <label for="gitlabProject">GitLab Project URL</label>
    <input type="text" id="gitlabProject" placeholder="https://gitlab.example.com/group/project">
  </div>

  <div class="form-group">
    <label for="pat">GitLab Personal Access Token</label>
    <div class="hint">Required scope: <code>read_api</code></div>
    <input type="password" id="pat" placeholder="glpat-xxxxxxxxxxxxxxxxxxxx">
  </div>

  <hr>

  <div class="form-group">
    <label for="githubRepo">GitHub Repository URL</label>
    <input type="text" id="githubRepo" placeholder="https://github.com/owner/repo">
  </div>

  <hr>

  <div class="form-group">
    <label for="jiraBaseUrl">Jira Base URL</label>
    <input type="text" id="jiraBaseUrl" placeholder="https://jira.example.com">
  </div>

  <div class="buttons">
    <button id="save" class="primary">Save</button>
    <button id="reset" class="danger">Reset</button>
  </div>

  <div id="status" class="status"></div>

  <script src="options.js"></script>
</body>
</html>
